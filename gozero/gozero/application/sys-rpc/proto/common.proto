syntax = "proto3";

package pb;

option go_package = "github.com/force-c/nai-tizi/application/sys-rpc/pb";

message Empty {}
message PingReq {}
message PingResp { string message = 1; }
message Ack { string msg = 1; }
message IdReq { int64 id = 1; }
message StringIdReq { string id = 1; }
message BatchIdsReq { repeated int64 ids = 1; }

message PageInfo {
  int64 total = 1;
  int64 size = 2;
  int64 current = 3;
  int64 pages = 4;
}
