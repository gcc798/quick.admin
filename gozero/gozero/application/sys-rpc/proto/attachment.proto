syntax = "proto3";

package pb;

option go_package = "github.com/force-c/nai-tizi/application/sys-rpc/pb";

import "proto/common.proto";

message Attachment {
  int64 attachment_id = 1;
  int64 env_id = 2;
  string file_name = 3;
  string file_key = 4;
  int64 file_size = 5;
  string file_type = 6;
  string file_ext = 7;
  string business_type = 8;
  string business_id = 9;
  string business_field = 10;
  bool is_public = 11;
  string access_url = 12;
  string metadata_json = 13;
  int32 status = 14;
  string expire_time = 15;
  int64 create_by = 16;
  string create_time = 17;
  string update_time = 18;
}

message AttachmentPageReq {
  int64 page_num = 1;
  int64 page_size = 2;
  string file_name = 3;
  string file_type = 4;
  string business_type = 5;
}

message AttachmentUploadReq {
  string env_code = 1;
  string file_name = 2;
  string content_type = 3;
  bytes content = 4;
}

message AttachmentBindReq {
  int64 attachment_id = 1;
  string business_type = 2;
  string business_id = 3;
  string business_field = 4;
  bool is_public = 5;
  string metadata_json = 6;
  string expire_time = 7;
}

message AttachmentBusinessQueryReq { string business_type = 1; string business_id = 2; }
message AttachmentUrlQueryReq { int64 attachment_id = 1; int64 expires = 2; }
message AttachmentUrlResp { int64 attachment_id = 1; string url = 2; int64 expires = 3; }
message AttachmentDownloadReq { int64 attachment_id = 1; }
message AttachmentDownloadResp { string file_name = 1; string content_type = 2; bytes content = 3; }
message AttachmentPageResp { repeated Attachment records = 1; PageInfo page = 2; }
message AttachmentListResp { repeated Attachment records = 1; }
