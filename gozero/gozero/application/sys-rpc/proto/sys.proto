syntax = "proto3";

package pb;

option go_package = "github.com/force-c/nai-tizi/application/sys-rpc/pb";

import "proto/common.proto";
import "proto/auth.proto";
import "proto/user.proto";
import "proto/role.proto";
import "proto/org.proto";
import "proto/menu.proto";
import "proto/dict.proto";
import "proto/config.proto";
import "proto/log.proto";
import "proto/storage.proto";
import "proto/attachment.proto";

service SysService {
  rpc Ping(PingReq) returns (PingResp);

  rpc AuthLogin(AuthLoginReq) returns (AuthLoginResp);
  rpc UserProfile(IdReq) returns (User);

  rpc UserCreate(UserCreateReq) returns (Ack);
  rpc UserImport(UserImportReq) returns (Ack);
  rpc UserPage(UserPageReq) returns (UserPageResp);
  rpc UserBatchDelete(BatchIdsReq) returns (Ack);
  rpc UserChangePassword(UserChangePasswordReq) returns (Ack);
  rpc UserUpdate(UserUpdateReq) returns (Ack);
  rpc UserResetPassword(UserPasswordReq) returns (Ack);
  rpc UserDetail(IdReq) returns (User);
  rpc UserDelete(IdReq) returns (Ack);

  rpc RoleCreate(RoleCreateReq) returns (Ack);
  rpc RolePage(RolePageReq) returns (RolePageResp);
  rpc RoleAssign(AssignRoleReq) returns (Ack);
  rpc RoleRemove(RemoveRoleReq) returns (Ack);
  rpc RoleUser(UserRoleQueryReq) returns (RoleListResp);
  rpc RolePermissionAdd(RolePermissionReq) returns (Ack);
  rpc RolePermissionDelete(RolePermissionReq) returns (Ack);
  rpc RolePermissions(RolePermissionsQueryReq) returns (RolePermissionsResp);
  rpc RoleUpdate(RoleUpdateReq) returns (Ack);
  rpc RoleDetail(IdReq) returns (Role);
  rpc RoleDelete(IdReq) returns (Ack);

  rpc OrgCreate(OrgCreateReq) returns (Ack);
  rpc OrgPage(OrgPageReq) returns (OrgPageResp);
  rpc OrgTree(Empty) returns (OrgTreeResp);
  rpc OrgBatchDelete(BatchIdsReq) returns (Ack);
  rpc OrgUpdate(OrgUpdateReq) returns (Ack);
  rpc OrgDetail(IdReq) returns (Org);
  rpc OrgDelete(IdReq) returns (Ack);

  rpc MenuUserTree(IdReq) returns (MenuListResp);
  rpc MenuTree(Empty) returns (MenuListResp);
  rpc MenuList(Empty) returns (MenuListResp);
  rpc MenuDetail(IdReq) returns (Menu);
  rpc MenuCreate(MenuReq) returns (Ack);
  rpc MenuUpdate(MenuReq) returns (Ack);
  rpc MenuDelete(IdReq) returns (Ack);

  rpc DictCreate(DictCreateReq) returns (Ack);
  rpc DictPage(DictPageReq) returns (DictPageResp);
  rpc DictBatchDelete(BatchIdsReq) returns (Ack);
  rpc DictType(DictTypeQueryReq) returns (DictListResp);
  rpc DictLabel(DictLabelQueryReq) returns (DictLabelResp);
  rpc DictUpdate(DictUpdateReq) returns (Ack);
  rpc DictDetail(StringIdReq) returns (Dict);
  rpc DictDelete(StringIdReq) returns (Ack);

  rpc ConfigCreate(ConfigCreateReq) returns (Ack);
  rpc ConfigPage(ConfigPageReq) returns (ConfigPageResp);
  rpc ConfigBatchDelete(BatchIdsReq) returns (Ack);
  rpc ConfigCode(ConfigCodeQueryReq) returns (ConfigListResp);
  rpc ConfigData(ConfigCodeQueryReq) returns (ConfigDataResp);
  rpc ConfigUpdate(ConfigUpdateReq) returns (Ack);
  rpc ConfigDetail(IdReq) returns (Config);
  rpc ConfigDelete(IdReq) returns (Ack);

  rpc LoginLogCreate(LoginLogReq) returns (Ack);
  rpc LoginLogPage(LoginLogPageReq) returns (LoginLogPageResp);
  rpc LoginLogBatchDelete(BatchIdsReq) returns (Ack);
  rpc LoginLogClean(LogCleanReq) returns (Ack);
  rpc LoginLogUpdate(LoginLogUpdateReq) returns (Ack);
  rpc LoginLogDetail(IdReq) returns (LoginLog);
  rpc LoginLogDelete(IdReq) returns (Ack);

  rpc OperLogCreate(OperLogReq) returns (Ack);
  rpc OperLogPage(OperLogPageReq) returns (OperLogPageResp);
  rpc OperLogBatchDelete(BatchIdsReq) returns (Ack);
  rpc OperLogClean(LogCleanReq) returns (Ack);
  rpc OperLogUpdate(OperLogUpdateReq) returns (Ack);
  rpc OperLogDetail(IdReq) returns (OperLog);
  rpc OperLogDelete(IdReq) returns (Ack);

  rpc StorageEnvCreate(StorageEnvReq) returns (Ack);
  rpc StorageEnvPage(StorageEnvPageReq) returns (StorageEnvPageResp);
  rpc StorageEnvDefault(Empty) returns (StorageEnv);
  rpc StorageEnvSetDefault(StorageEnvDefaultReq) returns (Ack);
  rpc StorageEnvUpdate(StorageEnvReq) returns (Ack);
  rpc StorageEnvDetail(IdReq) returns (StorageEnv);
  rpc StorageEnvTest(StorageEnvTestReq) returns (StorageEnvTestResp);
  rpc StorageEnvDelete(IdReq) returns (Ack);

  rpc AttachmentUploadFile(AttachmentUploadReq) returns (Attachment);
  rpc AttachmentBind(AttachmentBindReq) returns (Ack);
  rpc AttachmentDetail(IdReq) returns (Attachment);
  rpc AttachmentBusiness(AttachmentBusinessQueryReq) returns (AttachmentListResp);
  rpc AttachmentPage(AttachmentPageReq) returns (AttachmentPageResp);
  rpc AttachmentDownload(AttachmentDownloadReq) returns (AttachmentDownloadResp);
  rpc AttachmentUrl(AttachmentUrlQueryReq) returns (AttachmentUrlResp);
  rpc AttachmentDelete(IdReq) returns (Ack);
}
