syntax = "proto3";

package pb;

option go_package = "github.com/force-c/nai-tizi/application/sys-rpc/pb";

import "proto/common.proto";

message User {
  int64 user_id = 1;
  string user_name = 2;
  string nick_name = 3;
  int32 user_type = 4;
  string email = 5;
  string phonenumber = 6;
  int32 sex = 7;
  string avatar = 8;
  int32 status = 9;
  int64 sort = 10;
  string login_ip = 11;
  int64 login_date = 12;
  string open_id = 13;
  string union_id = 14;
  string remark = 15;
  int64 create_by = 16;
  int64 update_by = 17;
  string created_at = 18;
  string updated_at = 19;
}

message UserPageReq {
  int64 page_num = 1;
  int64 page_size = 2;
  string username = 3;
  string phonenumber = 4;
  int32 status = 5;
}

message UserCreateReq {
  string user_name = 1;
  string nick_name = 2;
  string password = 3;
  int32 user_type = 4;
  string email = 5;
  string phonenumber = 6;
  int32 sex = 7;
  string avatar = 8;
  int32 status = 9;
  string remark = 10;
}

message UserUpdateReq {
  int64 id = 1;
  string user_name = 2;
  string nick_name = 3;
  int32 user_type = 4;
  string email = 5;
  string phonenumber = 6;
  int32 sex = 7;
  string avatar = 8;
  int32 status = 9;
  string remark = 10;
}

message UserImportReq { repeated UserCreateReq users = 1; }
message UserPasswordReq { int64 id = 1; string new_password = 2; }
message UserChangePasswordReq { int64 user_id = 1; string old_password = 2; string new_password = 3; }
message UserPageResp { repeated User records = 1; PageInfo page = 2; }
message UserListResp { repeated User records = 1; }
