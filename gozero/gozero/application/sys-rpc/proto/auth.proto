syntax = "proto3";

package pb;

option go_package = "github.com/force-c/nai-tizi/application/sys-rpc/pb";

message UserInfo {
  int64 user_id = 1;
  string username = 2;
  string nickname = 3;
  string phonenumber = 4;
  string email = 5;
  string avatar = 6;
  int32 user_type = 7;
}

message AuthLoginReq {
  string client_key = 1;
  string client_secret = 2;
  string grant_type = 3;
  string username = 4;
  string password = 5;
  string code = 6;
  string phonenumber = 7;
  string email = 8;
  string wx_code = 9;
  string uuid = 10;
}

message AuthLoginResp {
  string client_id = 1;
  string client_key = 2;
  string device_type = 3;
  int64 timeout = 4;
  int64 active_timeout = 5;
  UserInfo user_info = 6;
}
