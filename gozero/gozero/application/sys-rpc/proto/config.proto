syntax = "proto3";

package pb;

option go_package = "github.com/force-c/nai-tizi/application/sys-rpc/pb";

import "proto/common.proto";

message Config {
  int64 id = 1;
  string name = 2;
  string code = 3;
  string data_json = 4;
  string remark = 5;
  int64 create_by = 6;
  string created_time = 7;
  int64 update_by = 8;
  string updated_time = 9;
}

message ConfigPageReq {
  int64 page_num = 1;
  int64 page_size = 2;
  string name = 3;
  string code = 4;
}

message ConfigCreateReq {
  string name = 1;
  string code = 2;
  string data_json = 3;
  string remark = 4;
  int64 create_by = 5;
  int64 update_by = 6;
}

message ConfigUpdateReq {
  int64 id = 1;
  string name = 2;
  string code = 3;
  string data_json = 4;
  string remark = 5;
  int64 update_by = 6;
}

message ConfigCodeQueryReq { string code = 1; }
message ConfigDataResp { string code = 1; string data_json = 2; }
message ConfigPageResp { repeated Config records = 1; PageInfo page = 2; }
message ConfigListResp { repeated Config records = 1; }
