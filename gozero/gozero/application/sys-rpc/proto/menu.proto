syntax = "proto3";

package pb;

option go_package = "github.com/force-c/nai-tizi/application/sys-rpc/pb";

message Menu {
  int64 id = 1;
  string menu_name = 2;
  int64 parent_id = 3;
  int64 sort = 4;
  string path = 5;
  string component = 6;
  string query = 7;
  int64 is_frame = 8;
  int64 is_cache = 9;
  int64 menu_type = 10;
  int64 visible = 11;
  int64 status = 12;
  string perms = 13;
  string icon = 14;
  string remark = 15;
  int64 create_by = 16;
  string created_time = 17;
  string updated_time = 18;
  repeated Menu children = 19;
}

message MenuReq {
  int64 id = 1;
  string menu_name = 2;
  int64 parent_id = 3;
  int64 sort = 4;
  string path = 5;
  string component = 6;
  string query = 7;
  int64 is_frame = 8;
  int64 is_cache = 9;
  int64 menu_type = 10;
  int64 visible = 11;
  int64 status = 12;
  string perms = 13;
  string icon = 14;
  string remark = 15;
}

message MenuListResp { repeated Menu records = 1; }
