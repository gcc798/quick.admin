syntax = "proto3";

package pb;

option go_package = "github.com/force-c/nai-tizi/application/sys-rpc/pb";

import "proto/common.proto";

message StorageEnv {
  int64 id = 1;
  string name = 2;
  string code = 3;
  string storage_type = 4;
  bool is_default = 5;
  int32 status = 6;
  string config_json = 7;
  string remark = 8;
  int64 create_by = 9;
  string created_at = 10;
  int64 update_by = 11;
  string updated_at = 12;
}

message StorageEnvPageReq {
  int64 page_num = 1;
  int64 page_size = 2;
  string name = 3;
  string storage_type = 4;
}

message StorageEnvReq {
  int64 id = 1;
  string name = 2;
  string code = 3;
  string storage_type = 4;
  bool is_default = 5;
  int32 status = 6;
  string config_json = 7;
  string remark = 8;
}

message StorageEnvDefaultReq { int64 id = 1; }
message StorageEnvTestReq { int64 id = 1; }
message StorageEnvTestResp { bool connected = 1; string msg = 2; }
message StorageEnvPageResp { repeated StorageEnv records = 1; PageInfo page = 2; }
message StorageEnvListResp { repeated StorageEnv records = 1; }
