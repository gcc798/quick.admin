syntax = "proto3";

package pb;

option go_package = "github.com/force-c/nai-tizi/application/sys-rpc/pb";

import "proto/common.proto";

message LoginLog {
  int64 id = 1;
  string user_name = 2;
  string ipaddr = 3;
  string login_location = 4;
  string browser = 5;
  string os = 6;
  int32 status = 7;
  string msg = 8;
  string login_time = 9;
  string client_id = 10;
}

message LoginLogPageReq {
  int64 page_num = 1;
  int64 page_size = 2;
  string user_name = 3;
  string ipaddr = 4;
  int32 status = 5;
  string start_time = 6;
  string end_time = 7;
}

message LoginLogReq {
  string user_name = 1;
  string ipaddr = 2;
  string login_location = 3;
  string browser = 4;
  string os = 5;
  int32 status = 6;
  string msg = 7;
  string client_id = 8;
}

message LoginLogUpdateReq {
  int64 id = 1;
  string user_name = 2;
  string ipaddr = 3;
  string login_location = 4;
  string browser = 5;
  string os = 6;
  int32 status = 7;
  string msg = 8;
  string client_id = 9;
}

message LogCleanReq { int64 days = 1; }
message LoginLogPageResp { repeated LoginLog records = 1; PageInfo page = 2; }

message OperLog {
  int64 id = 1;
  string title = 2;
  string business_type = 3;
  string method = 4;
  string request_method = 5;
  string device_type = 6;
  string oper_name = 7;
  string oper_url = 8;
  string oper_ip = 9;
  string oper_location = 10;
  string oper_param = 11;
  string json_result = 12;
  string status = 13;
  string error_msg = 14;
  string oper_time = 15;
  int64 cost_time = 16;
  string user_agent = 17;
}

message OperLogPageReq {
  int64 page_num = 1;
  int64 page_size = 2;
  string title = 3;
  string oper_name = 4;
  string business_type = 5;
  string status = 6;
  string start_time = 7;
  string end_time = 8;
}

message OperLogReq {
  string title = 1;
  string business_type = 2;
  string method = 3;
  string request_method = 4;
  string device_type = 5;
  string oper_name = 6;
  string oper_url = 7;
  string oper_ip = 8;
  string oper_location = 9;
  string oper_param = 10;
  string json_result = 11;
  string status = 12;
  string error_msg = 13;
  int64 cost_time = 14;
  string user_agent = 15;
}

message OperLogUpdateReq {
  int64 id = 1;
  string title = 2;
  string business_type = 3;
  string method = 4;
  string request_method = 5;
  string device_type = 6;
  string oper_name = 7;
  string oper_url = 8;
  string oper_ip = 9;
  string oper_location = 10;
  string oper_param = 11;
  string json_result = 12;
  string status = 13;
  string error_msg = 14;
  int64 cost_time = 15;
  string user_agent = 16;
}

message OperLogPageResp { repeated OperLog records = 1; PageInfo page = 2; }
