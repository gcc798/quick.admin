syntax = "proto3";

package pb;

option go_package = "github.com/force-c/nai-tizi/application/sys-rpc/pb";

import "proto/common.proto";

message Dict {
  int64 id = 1;
  int64 parent_id = 2;
  string dict_type = 3;
  string dict_label = 4;
  string dict_value = 5;
  int64 sort = 6;
  bool is_default = 7;
  int32 status = 8;
  string remark = 9;
  int64 create_by = 10;
  int64 update_by = 11;
  string created_time = 12;
  string updated_time = 13;
}

message DictPageReq {
  int64 page_num = 1;
  int64 page_size = 2;
  string dict_type = 3;
  string dict_label = 4;
  int32 status = 5;
}

message DictCreateReq {
  int64 parent_id = 1;
  string dict_type = 2;
  string dict_label = 3;
  string dict_value = 4;
  int64 sort = 5;
  bool is_default = 6;
  int32 status = 7;
  string remark = 8;
  int64 create_by = 9;
  int64 update_by = 10;
}

message DictUpdateReq {
  string id = 1;
  int64 parent_id = 2;
  string dict_type = 3;
  string dict_label = 4;
  string dict_value = 5;
  int64 sort = 6;
  bool is_default = 7;
  int32 status = 8;
  string remark = 9;
  int64 update_by = 10;
}

message DictTypeQueryReq { string dict_type = 1; int64 parent_id = 2; }
message DictLabelQueryReq { string dict_type = 1; string dict_value = 2; }
message DictLabelResp { string label = 1; }
message DictPageResp { repeated Dict records = 1; PageInfo page = 2; }
message DictListResp { repeated Dict records = 1; }
