# Casbin RBAC Model - 单一企业模式
# 支持角色继承和超级管理员

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub) && keyMatch2(r.obj, p.obj) && (r.act == p.act || p.act == '*') || p.sub == "role::super_admin" && g(r.sub, p.sub)
