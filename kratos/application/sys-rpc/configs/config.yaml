server:
  grpc:
    network: tcp
    addr: 0.0.0.0:9900
    timeout: 1s
registry:
  mode: direct
  driver: etcd
  service: sys-rpc
  namespace: /kratos
  registerTTL: 15s
  etcd:
    endpoints:
      - 127.0.0.1:2379
    username: ""
    password: ""
    timeout: 5s
auth:
  allowConcurrent: false
  shareToken: false
jwt:
  secret: "nai-tizi-kratos-secret"
  expire: 1800
  issuer: "NTZ-go"
data:
  database:
    driver: postgres
    dsn: host=127.0.0.1 user=postgres password=post123 dbname=nai-tizi port=5433 sslmode=disable TimeZone=Asia/Shanghai
  redis:
    addr: 127.0.0.1:6379
    password: "123456"
    db: 0
  wechat:
    appId: ""
    secret: ""
    timeout: 10s
observability:
  dbSlowThresholdMs: 100
  redisSlowThresholdMs: 50
  dbPoolSampleInterval: 15s
